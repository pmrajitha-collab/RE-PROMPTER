<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Re-Prompter | AI Prompt Engineering</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Anton&display=swap" rel="stylesheet">
    
    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & Babel CDNs -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Framer Motion -->
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                        display: ['Anton', 'sans-serif'],
                    },
                    colors: {
                        'neon-green': '#00FF00',
                        'brutal-black': '#000000',
                    }
                }
            }
        }
    </script>

    <style type="text/tailwindcss">
        @layer base {
            body {
                @apply bg-white text-brutal-black font-sans;
            }
        }

        @keyframes marquee {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        .marquee-track {
            display: flex;
            animation: marquee 20s linear infinite;
        }

        .brutal-border {
            @apply border-2 border-brutal-black;
        }

        .brutal-shadow {
            box-shadow: 4px 4px 0px 0px rgba(0,0,0,1);
        }

        .brutal-shadow-hover:hover {
            box-shadow: 2px 2px 0px 0px rgba(0,0,0,1);
            transform: translate(2px, 2px);
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #000;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const { motion, AnimatePresence } = window.Motion;

        // --- Components ---

        const PixelLogo = ({ size = "md" }) => {
            const scale = size === "lg" ? "scale-150" : size === "sm" ? "scale-75" : "scale-100";
            return (
                <div className={`relative inline-block ${scale} transition-transform hover:scale-110`}>
                    {/* 3D Shadow Layer */}
                    <div className="absolute top-1 left-1 w-12 h-12 bg-brutal-black grid grid-cols-4 grid-rows-4 gap-0.5 p-0.5 opacity-30">
                        {[...Array(16)].map((_, i) => <div key={i} className="bg-brutal-black" />)}
                    </div>
                    {/* Main Logo Layer */}
                    <div className="relative w-12 h-12 bg-brutal-black brutal-border grid grid-cols-4 grid-rows-4 gap-0.5 p-0.5 brutal-shadow">
                        {/* "R" Shape in Pixels */}
                        {[
                            1,1,1,0,
                            1,0,0,1,
                            1,1,1,0,
                            1,0,0,1
                        ].map((active, i) => (
                            <div key={i} className={`${active ? 'bg-neon-green' : 'bg-transparent'} transition-colors duration-500`} />
                        ))}
                    </div>
                </div>
            );
        };

        // --- Mock Lucide Icons for React ---
        const Icon = ({ name, size = 24, className = "" }) => {
            const ref = useRef(null);
            useEffect(() => {
                if (ref.current) {
                    // Create a stable internal structure that Lucide can modify
                    // without interfering with React's virtual DOM tracking.
                    ref.current.innerHTML = `<i data-lucide="${name}"></i>`;
                    lucide.createIcons({
                        attrs: {
                            stroke: "currentColor",
                            "stroke-width": 2,
                            "stroke-linecap": "round",
                            "stroke-linejoin": "round",
                            width: size,
                            height: size,
                        },
                        element: ref.current
                    });
                }
            }, [name, size]);
            // Return a span that acts as a "black box" for React.
            // React manages the span, but Lucide manages everything inside it.
            return <span ref={ref} className={`inline-flex items-center justify-center ${className}`} style={{ width: size, height: size }}></span>;
        };

        // --- Constants ---
        const EXAMPLE_PROMPTS = [
            { label: 'Pomodoro', prompt: 'A minimal Pomodoro timer with a brutalist aesthetic, sound alerts, and session history.' },
            { label: 'Dashboard', prompt: 'A personal finance dashboard with interactive charts using Recharts and a dark mode toggle.' },
            { label: 'Whiteboard', prompt: 'A collaborative real-time whiteboard using Konva for drawing and WebSockets for sync.' },
            { label: 'Markdown', prompt: 'A markdown editor with live preview, syntax highlighting, and local storage persistence.' },
            { label: 'Weather', prompt: 'A weather app that uses geolocation, a glassmorphism design, and dynamic backgrounds.' },
        ];

        const STRATEGIES = [
            { id: 'descriptive', label: 'Descriptive', icon: 'type', description: 'Adds rich detail and visual context.' },
            { id: 'technical', label: 'Technical', icon: 'code', description: 'Focuses on stack, architecture, and logic.' },
            { id: 'concise', label: 'Concise', icon: 'zap', description: 'Removes fluff while keeping core intent.' },
            { id: 'creative', label: 'Creative', icon: 'sparkles', description: 'Adds unique twists and artistic flair.' },
        ];

        // --- App Component ---
        function App() {
            const [user, setUser] = useState(null);
            const [authEmail, setAuthEmail] = useState('');
            const [authPassword, setAuthPassword] = useState('');
            const [authLoading, setAuthLoading] = useState(false);
            const [authError, setAuthError] = useState(null);

            const [input, setInput] = useState('');
            const [attachedFiles, setAttachedFiles] = useState([]);
            const [isGenerating, setIsGenerating] = useState(false);
            const [history, setHistory] = useState([]);
            const [selectedStrategy, setSelectedStrategy] = useState('descriptive');
            const [currentOutput, setCurrentOutput] = useState('');
            const [copied, setCopied] = useState(false);
            const [error, setError] = useState(null);

            const [isGeneratingImage, setIsGeneratingImage] = useState(false);
            const [generatedImageUrl, setGeneratedImageUrl] = useState(null);
            const [imageError, setImageError] = useState(null);

            // Simulated Auth Logic
            const handleLogin = (e) => {
                e.preventDefault();
                setAuthLoading(true);
                setTimeout(() => {
                    const mockUser = { email: authEmail };
                    localStorage.setItem('reprompter_token_mock', 'mock-jwt-token');
                    localStorage.setItem('reprompter_user_mock', JSON.stringify(mockUser));
                    setUser(mockUser);
                    setAuthLoading(false);
                }, 800);
            };

            const handleLogout = () => {
                localStorage.removeItem('reprompter_token_mock');
                localStorage.removeItem('reprompter_user_mock');
                setUser(null);
            };

            useEffect(() => {
                const savedUser = localStorage.getItem('reprompter_user_mock');
                if (savedUser) setUser(JSON.parse(savedUser));

                const savedHistory = localStorage.getItem('reprompter_history');
                if (savedHistory) setHistory(JSON.parse(savedHistory));
            }, []);

            useEffect(() => {
                localStorage.setItem('reprompter_history', JSON.stringify(history));
            }, [history]);

            const handleFileUpload = (e) => {
                const files = Array.from(e.target.files);
                files.forEach(file => {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        setAttachedFiles(prev => [...prev, {
                            name: file.name,
                            content: event.target.result,
                            id: Math.random().toString(36).substring(7)
                        }]);
                    };
                    reader.readAsText(file);
                });
            };

            const removeFile = (id) => {
                setAttachedFiles(prev => prev.filter(f => f.id !== id));
            };

            const handleEnhance = async () => {
                if (!input.trim() && attachedFiles.length === 0) return;
                setIsGenerating(true);
                setError(null);
                setCurrentOutput('');

                try {
                    const strategy = STRATEGIES.find(s => s.id === selectedStrategy);
                    
                    let context = input;
                    if (attachedFiles.length > 0) {
                        context += "\n\n--- ATTACHED FILES CONTEXT ---\n";
                        attachedFiles.forEach(f => {
                            context += `\nFILE: ${f.name}\n${f.content}\n---`;
                        });
                    }

                    const prompt = `
                        You are an expert Prompt Engineer. Your task is to take a user's basic idea and transform it into a high-quality, professional AI prompt.
                        The user wants to generate a "single file index.html" application (using Tailwind CSS, modern JS, and often Lucide icons or Framer Motion).
                        
                        User Input/Context: "${context}"
                        Strategy: ${strategy.label} - ${strategy.description}
                        
                        Requirements for the Enhanced Prompt:
                        1. It must be highly specific about UI/UX (mentioning Tailwind classes, layout patterns like Bento grids or split screens).
                        2. It must specify the technical stack (React, Lucide, Motion, Tailwind).
                        3. It must emphasize "single file" architecture.
                        4. It must include instructions for "juice" (animations, transitions, feedback).
                        5. The output should be the ENHANCED PROMPT ONLY. No conversational filler.
                    `;

                    // Direct API call to Gemini
                    const apiKey = "__GEMINI_API_KEY__"; 
                    
                    if (!apiKey || apiKey === "" || apiKey.startsWith("__")) {
                        throw new Error("Gemini API Key is missing. Please ensure it is set in your environment variables.");
                    }

                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }]
                        })
                    });

                    if (!response.ok) {
                        const errorData = await response.json();
                        throw new Error(errorData.error?.message || `API Error: ${response.status}`);
                    }

                    const data = await response.json();
                    const enhancedText = data.candidates?.[0]?.content?.parts?.[0]?.text || 'Failed to generate prompt.';
                    
                    setCurrentOutput(enhancedText);
                    setHistory(prev => [{
                        id: Math.random().toString(36).substring(7),
                        original: input,
                        enhanced: enhancedText,
                        timestamp: Date.now(),
                        strategy: selectedStrategy
                    }, ...prev].slice(0, 20));

                } catch (err) {
                    setError(err.message || 'An error occurred.');
                } finally {
                    setIsGenerating(false);
                }
            };

            const handleGenerateImage = async () => {
                if (!currentOutput) return;
                setIsGeneratingImage(true);
                setImageError(null);
                setGeneratedImageUrl(null);

                try {
                    const apiKey = "__GEMINI_API_KEY__";
                    if (!apiKey || apiKey === "" || apiKey.startsWith("__")) {
                        throw new Error("Gemini API Key is missing.");
                    }

                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-image:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{
                                parts: [{
                                    text: `Generate a high-quality, professional UI/UX preview image for a web application based on this technical prompt: ${currentOutput}. The image should look like a modern, clean, and polished software interface.`
                                }]
                            }]
                        })
                    });

                    if (!response.ok) {
                        const errorData = await response.json();
                        throw new Error(errorData.error?.message || `API Error: ${response.status}`);
                    }

                    const data = await response.json();
                    const parts = data.candidates?.[0]?.content?.parts || [];
                    const imagePart = parts.find(p => p.inlineData);

                    if (imagePart) {
                        const base64Data = imagePart.inlineData.data;
                        const mimeType = imagePart.inlineData.mimeType;
                        setGeneratedImageUrl(`data:${mimeType};base64,${base64Data}`);
                    } else {
                        throw new Error("No image was generated in the response.");
                    }
                } catch (err) {
                    setImageError(err.message || 'Failed to generate image.');
                } finally {
                    setIsGeneratingImage(false);
                }
            };

            const copyToClipboard = (text) => {
                navigator.clipboard.writeText(text);
                setCopied(true);
                setTimeout(() => setCopied(false), 2000);
            };

            if (!user) {
                return (
                    <div className="min-h-screen bg-brutal-black flex items-center justify-center p-6 font-sans overflow-hidden relative">
                        <div className="absolute inset-0 opacity-20 pointer-events-none">
                            <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] bg-neon-green/20 blur-[120px] rounded-full" />
                            <div className="absolute top-0 left-0 w-full h-full" style={{ backgroundImage: 'radial-gradient(#fff 1px, transparent 1px)', backgroundSize: '40px 40px' }} />
                        </div>

                        <motion.div 
                            initial={{ scale: 0.9, opacity: 0 }}
                            animate={{ scale: 1, opacity: 1 }}
                            className="w-full max-w-md bg-white brutal-border brutal-shadow p-8 relative z-10"
                        >
                            <div className="flex flex-col items-center mb-8 text-center">
                                <div className="mb-6 rotate-3">
                                    <PixelLogo size="lg" />
                                </div>
                                <h1 className="font-display text-4xl uppercase tracking-tighter leading-none">
                                    JWST <span className="text-neon-green [text-shadow:1px_1px_0px_#000]">Vision</span>
                                </h1>
                                <p className="text-[10px] font-mono uppercase tracking-widest opacity-50 mt-2">Deep Space Prompt Engineering</p>
                            </div>

                            <form onSubmit={handleLogin} className="space-y-4">
                                <div className="space-y-1">
                                    <label className="text-[10px] font-mono uppercase font-bold">Observer Email</label>
                                    <input 
                                        type="email" 
                                        required
                                        value={authEmail}
                                        onChange={(e) => setAuthEmail(e.target.value)}
                                        className="w-full p-3 brutal-border focus:ring-2 focus:ring-neon-green outline-none font-mono text-sm"
                                        placeholder="commander@nasa.gov"
                                    />
                                </div>
                                <div className="space-y-1">
                                    <label className="text-[10px] font-mono uppercase font-bold">Access Key</label>
                                    <input 
                                        type="password" 
                                        required
                                        value={authPassword}
                                        onChange={(e) => setAuthPassword(e.target.value)}
                                        className="w-full p-3 brutal-border focus:ring-2 focus:ring-neon-green outline-none font-mono text-sm"
                                        placeholder="••••••••"
                                    />
                                </div>
                                <button 
                                    type="submit"
                                    disabled={authLoading}
                                    className="w-full py-4 bg-brutal-black text-white font-display text-xl uppercase tracking-widest hover:bg-neon-green hover:text-brutal-black transition-all brutal-shadow brutal-shadow-hover active:translate-y-1 active:translate-x-1 active:shadow-none disabled:opacity-50"
                                >
                                    {authLoading ? 'Authenticating...' : 'Initiate Sequence'}
                                </button>
                            </form>
                        </motion.div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-white flex flex-col font-sans selection:bg-neon-green selection:text-brutal-black">
                    <div className="bg-brutal-black text-white py-2 overflow-hidden border-b-2 border-brutal-black relative">
                        <div className="marquee-track whitespace-nowrap">
                            {[...Array(10)].map((_, i) => (
                                <span key={i} className="mx-4 font-display text-xl tracking-widest uppercase italic">
                                    Re-Prompter // AI Prompt Engineering // Single File Specialist // Re-Prompter //
                                </span>
                            ))}
                        </div>
                        <div className="absolute right-4 top-1/2 -translate-y-1/2 flex items-center gap-4 bg-brutal-black pl-4">
                            <div className="text-[10px] font-mono uppercase hidden sm:block">
                                <span className="opacity-50">User:</span> {user.email}
                            </div>
                            <button 
                                onClick={handleLogout}
                                className="text-[10px] font-mono uppercase bg-white text-brutal-black px-2 py-0.5 brutal-border hover:bg-neon-green transition-colors"
                            >
                                Logout
                            </button>
                        </div>
                    </div>

                    <main className="flex-1 grid grid-cols-1 lg:grid-cols-12 gap-0">
                        <section className="lg:col-span-5 border-r-2 border-brutal-black p-6 lg:p-10 flex flex-col gap-8 bg-[#f9f9f9]">
                            <div className="space-y-2">
                                <div className="flex items-center gap-2 text-xs font-mono uppercase tracking-tighter opacity-50">
                                    <span className="w-2 h-2 bg-brutal-black rounded-full animate-pulse" />
                                    Input Terminal
                                </div>
                                <h1 className="font-display text-6xl lg:text-7xl leading-[0.85] uppercase -ml-1">
                                    Refine Your <br />
                                    <span className="text-neon-green [text-shadow:2px_2px_0px_#000]">Vision</span>
                                </h1>
                            </div>

                            <div className="space-y-6">
                                <div className="space-y-3">
                                    <label className="text-xs font-mono uppercase font-bold flex items-center gap-2">
                                        <Icon name="lightbulb" size={14} /> Quick Suggestions
                                    </label>
                                    <div className="flex flex-wrap gap-2">
                                        {EXAMPLE_PROMPTS.map((p, i) => (
                                            <button
                                                key={i}
                                                onClick={() => setInput(p.prompt)}
                                                className="text-[10px] font-mono uppercase px-2 py-1 brutal-border bg-white hover:bg-neon-green transition-colors"
                                            >
                                                {p.label}
                                            </button>
                                        ))}
                                    </div>
                                </div>

                                <div className="space-y-2">
                                    <div className="flex items-center justify-between">
                                        <label className="text-xs font-mono uppercase font-bold flex items-center gap-2">
                                            <Icon name="terminal" size={14} /> Basic Idea
                                        </label>
                                        <label className="cursor-pointer flex items-center gap-1 text-[10px] font-mono uppercase font-bold hover:text-neon-green transition-colors">
                                            <Icon name="paperclip" size={12} />
                                            Add Files
                                            <input type="file" multiple className="hidden" onChange={handleFileUpload} />
                                        </label>
                                    </div>
                                    <div className="relative">
                                        <textarea
                                            value={input}
                                            onChange={(e) => setInput(e.target.value)}
                                            placeholder="e.g., a minimal pomodoro timer with a brutalist aesthetic..."
                                            className="w-full h-40 p-4 brutal-border bg-white focus:outline-none focus:ring-2 focus:ring-neon-green resize-none font-mono text-sm brutal-shadow"
                                        />
                                        <AnimatePresence>
                                            {attachedFiles.length > 0 && (
                                                <motion.div 
                                                    initial={{ opacity: 0, y: 10 }}
                                                    animate={{ opacity: 1, y: 0 }}
                                                    className="absolute bottom-4 left-4 right-4 flex flex-wrap gap-2"
                                                >
                                                    {attachedFiles.map(f => (
                                                        <div key={f.id} className="bg-brutal-black text-white text-[9px] px-2 py-1 brutal-border flex items-center gap-2">
                                                            <span className="truncate max-w-[80px]">{f.name}</span>
                                                            <button onClick={() => removeFile(f.id)} className="hover:text-red-500">
                                                                <Icon name="x" size={10} />
                                                            </button>
                                                        </div>
                                                    ))}
                                                </motion.div>
                                            )}
                                        </AnimatePresence>
                                    </div>
                                </div>

                                <div className="space-y-3">
                                    <label className="text-xs font-mono uppercase font-bold flex items-center gap-2">
                                        <Icon name="layers" size={14} /> Strategy
                                    </label>
                                    <div className="grid grid-cols-2 gap-2">
                                        {STRATEGIES.map((s) => (
                                            <button
                                                key={s.id}
                                                onClick={() => setSelectedStrategy(s.id)}
                                                className={`flex items-center gap-3 p-3 brutal-border transition-all text-left group ${
                                                    selectedStrategy === s.id ? 'bg-neon-green brutal-shadow' : 'bg-white hover:bg-gray-50'
                                                }`}
                                            >
                                                <div className={`p-1.5 brutal-border bg-white ${selectedStrategy === s.id ? 'bg-white' : 'group-hover:bg-neon-green'}`}>
                                                    <Icon name={s.icon} size={16} />
                                                </div>
                                                <div>
                                                    <div className="text-xs font-bold uppercase leading-none mb-1">{s.label}</div>
                                                    <div className="text-[10px] opacity-60 leading-tight">{s.description.split(' ')[0]}...</div>
                                                </div>
                                            </button>
                                        ))}
                                    </div>
                                </div>

                                <button
                                    onClick={handleEnhance}
                                    disabled={isGenerating || !input.trim()}
                                    className={`w-full py-4 brutal-border font-display text-2xl uppercase tracking-wider flex items-center justify-center gap-3 transition-all ${
                                        isGenerating || !input.trim() ? 'bg-gray-200 cursor-not-allowed opacity-50' : 'bg-brutal-black text-white hover:bg-neon-green hover:text-brutal-black brutal-shadow brutal-shadow-hover active:translate-y-1 active:translate-x-1 active:shadow-none'
                                    }`}
                                >
                                    {isGenerating ? <Icon name="refresh-cw" className="animate-spin" /> : <>Enhance Prompt <Icon name="chevron-right" /></>}
                                </button>
                            </div>

                            <div className="mt-auto pt-10 border-t border-brutal-black/10">
                                <div className="flex items-center justify-between mb-4">
                                    <div className="text-xs font-mono uppercase font-bold flex items-center gap-2">
                                        <Icon name="history" size={14} /> Recent Lab Work
                                    </div>
                                </div>
                                <div className="space-y-2 max-h-40 overflow-y-auto pr-2 custom-scrollbar">
                                    {history.map((entry) => (
                                        <button
                                            key={entry.id}
                                            onClick={() => {
                                                setInput(entry.original);
                                                setCurrentOutput(entry.enhanced);
                                                setSelectedStrategy(entry.strategy);
                                            }}
                                            className="w-full text-left p-2 border border-brutal-black/10 hover:border-brutal-black hover:bg-white text-[11px] font-mono truncate transition-colors"
                                        >
                                            {entry.original}
                                        </button>
                                    ))}
                                </div>
                            </div>
                        </section>

                        <section className="lg:col-span-7 p-6 lg:p-10 bg-white flex flex-col gap-6 relative overflow-hidden">
                            <div className="absolute inset-0 opacity-[0.03] pointer-events-none" style={{ backgroundImage: 'radial-gradient(#000 1px, transparent 1px)', backgroundSize: '20px 20px' }} />
                            <div className="relative z-10 flex flex-col h-full">
                                <div className="flex items-center justify-between mb-6">
                                    <div className="flex items-center gap-3 text-xs font-mono uppercase tracking-tighter">
                                        <PixelLogo size="sm" />
                                        Enhanced Output
                                    </div>
                                    {currentOutput && (
                                        <div className="flex items-center gap-2">
                                            <button
                                                onClick={handleEnhance}
                                                disabled={isGenerating}
                                                className="flex items-center gap-2 px-3 py-1.5 brutal-border text-xs font-bold uppercase bg-white hover:bg-gray-50 transition-all"
                                            >
                                                <Icon name="refresh-cw" size={14} className={isGenerating ? 'animate-spin' : ''} />
                                                Retry
                                            </button>
                                            <button
                                                onClick={() => copyToClipboard(currentOutput)}
                                                className={`flex items-center gap-2 px-3 py-1.5 brutal-border text-xs font-bold uppercase transition-all ${copied ? 'bg-neon-green' : 'bg-white hover:bg-gray-50'}`}
                                            >
                                                <Icon name={copied ? 'check' : 'copy'} size={14} />
                                                {copied ? 'Copied!' : 'Copy Prompt'}
                                            </button>
                                        </div>
                                    )}
                                </div>

                                <div className="flex-1 brutal-border bg-white relative overflow-hidden flex flex-col brutal-shadow">
                                    <div className="bg-brutal-black text-white px-4 py-2 flex items-center justify-between border-b-2 border-brutal-black">
                                        <div className="flex gap-1.5">
                                            <div className="w-2.5 h-2.5 rounded-full bg-red-500" />
                                            <div className="w-2.5 h-2.5 rounded-full bg-yellow-500" />
                                            <div className="w-2.5 h-2.5 rounded-full bg-green-500" />
                                        </div>
                                        <div className="text-[10px] font-mono opacity-50 uppercase tracking-widest">prompt_v1.0.txt</div>
                                    </div>
                                    <div className="flex-1 p-6 overflow-y-auto font-mono text-sm leading-relaxed bg-[#1a1a1a] text-white selection:bg-neon-green selection:text-brutal-black">
                                        {isGenerating ? (
                                            <div className="flex flex-col items-center justify-center h-full gap-4">
                                                <div className="w-12 h-12 border-4 border-neon-green border-t-transparent rounded-full animate-spin" />
                                                <div className="text-xs uppercase tracking-widest animate-pulse">Synthesizing...</div>
                                            </div>
                                        ) : currentOutput ? (
                                            <motion.div initial={{ opacity: 0, y: 10 }} animate={{ opacity: 1, y: 0 }} className="whitespace-pre-wrap">
                                                {currentOutput}
                                            </motion.div>
                                        ) : (
                                            <div className="h-full flex flex-col items-center justify-center opacity-20 text-center gap-4">
                                                <Icon name="terminal" size={48} />
                                                <div className="max-w-xs uppercase text-xs tracking-widest font-bold">Waiting for input</div>
                                            </div>
                                        )}
                                    </div>
                                </div>

                                {/* Bottom Action Bar for Image Generation */}
                                {currentOutput && !isGenerating && (
                                    <div className="mt-4 p-4 brutal-border bg-[#f0f0f0] brutal-shadow flex flex-col gap-4">
                                        {!generatedImageUrl && !isGeneratingImage ? (
                                            <div className="flex items-center justify-between gap-4">
                                                <div className="text-[10px] font-mono uppercase opacity-50 flex items-center gap-2">
                                                    <Icon name="image" size={12} />
                                                    No UI Preview Generated
                                                </div>
                                                <button
                                                    onClick={handleGenerateImage}
                                                    className="flex items-center gap-2 px-4 py-2 bg-brutal-black text-white brutal-border brutal-shadow brutal-shadow-hover text-xs font-bold uppercase hover:bg-neon-green hover:text-brutal-black transition-all"
                                                >
                                                    <Icon name="sparkles" size={14} />
                                                    Generate UI Preview
                                                </button>
                                            </div>
                                        ) : isGeneratingImage ? (
                                            <div className="flex items-center justify-center py-4 gap-4">
                                                <div className="w-6 h-6 border-2 border-brutal-black border-t-transparent rounded-full animate-spin" />
                                                <div className="text-xs font-mono uppercase animate-pulse">Synthesizing Visual Identity...</div>
                                            </div>
                                        ) : (
                                            <div className="flex items-center gap-4">
                                                <div 
                                                    className="w-20 h-20 brutal-border bg-white overflow-hidden cursor-pointer group relative"
                                                    onClick={() => setGeneratedImageUrl(generatedImageUrl)} // This just keeps it open if clicked, but let's make it clear
                                                >
                                                    <img src={generatedImageUrl} className="w-full h-full object-cover" />
                                                    <div className="absolute inset-0 bg-brutal-black/40 opacity-0 group-hover:opacity-100 flex items-center justify-center transition-opacity">
                                                        <Icon name="maximize-2" size={16} className="text-white" />
                                                    </div>
                                                </div>
                                                <div className="flex-1">
                                                    <div className="text-[10px] font-mono uppercase font-bold mb-1">UI Preview Ready</div>
                                                    <div className="flex gap-2">
                                                        <button
                                                            onClick={handleGenerateImage}
                                                            className="flex items-center gap-2 px-3 py-1.5 brutal-border bg-white hover:bg-gray-50 text-[10px] font-bold uppercase transition-all"
                                                        >
                                                            <Icon name="refresh-cw" size={12} />
                                                            Regenerate
                                                        </button>
                                                        <button
                                                            onClick={() => {
                                                                const link = document.createElement('a');
                                                                link.href = generatedImageUrl;
                                                                link.download = 'reprompter-preview.png';
                                                                link.click();
                                                            }}
                                                            className="flex items-center gap-2 px-3 py-1.5 brutal-border bg-neon-green text-brutal-black text-[10px] font-bold uppercase transition-all"
                                                        >
                                                            <Icon name="download" size={12} />
                                                            Download
                                                        </button>
                                                    </div>
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                )}
                            </div>
                        </section>
                    </main>

                    {/* Image Preview Modal */}
                    <AnimatePresence>
                        {generatedImageUrl && (
                            <motion.div 
                                initial={{ opacity: 0 }}
                                animate={{ opacity: 1 }}
                                exit={{ opacity: 0 }}
                                className="fixed inset-0 z-50 flex items-center justify-center p-6 bg-brutal-black/90 backdrop-blur-sm"
                                onClick={() => setGeneratedImageUrl(null)}
                            >
                                <motion.div 
                                    initial={{ scale: 0.9, y: 20 }}
                                    animate={{ scale: 1, y: 0 }}
                                    exit={{ scale: 0.9, y: 20 }}
                                    className="relative max-w-4xl w-full bg-white brutal-border brutal-shadow p-2"
                                    onClick={e => e.stopPropagation()}
                                >
                                    <div className="bg-brutal-black text-white px-4 py-2 flex items-center justify-between border-b-2 border-brutal-black mb-2">
                                        <div className="text-xs font-mono uppercase tracking-widest">ui_preview_render.png</div>
                                        <button onClick={() => setGeneratedImageUrl(null)} className="hover:text-neon-green">
                                            <Icon name="x" size={18} />
                                        </button>
                                    </div>
                                    <img 
                                        src={generatedImageUrl} 
                                        alt="Generated UI Preview" 
                                        className="w-full h-auto block brutal-border"
                                        referrerPolicy="no-referrer"
                                    />
                                    <div className="mt-4 flex justify-end gap-4 p-2">
                                        <button 
                                            onClick={() => {
                                                const link = document.createElement('a');
                                                link.href = generatedImageUrl;
                                                link.download = 'reprompter-preview.png';
                                                link.click();
                                            }}
                                            className="flex items-center gap-2 px-4 py-2 bg-neon-green brutal-border brutal-shadow brutal-shadow-hover text-xs font-bold uppercase"
                                        >
                                            <Icon name="download" size={14} />
                                            Download Preview
                                        </button>
                                    </div>
                                </motion.div>
                            </motion.div>
                        )}
                    </AnimatePresence>

                    {/* Image Generation Error Toast */}
                    <AnimatePresence>
                        {imageError && (
                            <motion.div 
                                initial={{ opacity: 0, x: 100 }}
                                animate={{ opacity: 1, x: 0 }}
                                exit={{ opacity: 0, x: 100 }}
                                className="fixed bottom-6 right-6 z-50 p-4 bg-red-100 border-2 border-red-600 text-red-600 font-mono text-xs brutal-shadow flex items-center gap-3"
                            >
                                <Icon name="alert-circle" size={18} />
                                <div>
                                    <div className="font-bold uppercase">Imaging Error</div>
                                    <div>{imageError}</div>
                                </div>
                                <button onClick={() => setImageError(null)} className="ml-4">
                                    <Icon name="x" size={14} />
                                </button>
                            </motion.div>
                        )}
                    </AnimatePresence>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
